stages:
  - build
  - terraform
  - release

variables:
  REGISTRY: europe-west3-docker.pkg.dev
  PROJECT_ID: tefde-gcp-fastoss-dev-gke
  REPO: devops-reports

# ---------------------------------------------------------------------------
# GCP authentication anchor
#
# Uses the devops-reports-runner service account key stored as a masked
# GitLab CI variable named GCP_SA_KEY (JSON format). That SA already has
# roles/artifactregistry.writer on the Artifact Registry repo.
#
# Generate the key once after terraform apply:
#   gcloud iam service-accounts keys create runner-key.json \
#     --iam-account=devops-reports-runner@tefde-gcp-fastoss-dev-gke.iam.gserviceaccount.com \
#     --project=tefde-gcp-fastoss-dev-gke
# Then add the contents of runner-key.json as the GCP_SA_KEY CI variable.
#
# To upgrade to keyless Workload Identity Federation (no long-lived keys):
#   1. Add a google_iam_workload_identity_pool + provider resource in Terraform
#      targeting the GitLab OIDC issuer (https://gitlab.com).
#   2. Grant the pool serviceAccount impersonation on devops-reports-runner.
#   3. Replace this anchor with the id_tokens + gcloud oidc flow.
# ---------------------------------------------------------------------------
.gcp_auth: &gcp_auth
  variables:
    # DinD: disable TLS so Docker client talks to the daemon over plain TCP.
    # Scoped here so terraform-plan and create-release are not affected.
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  image: google/cloud-sdk:slim
  services:
    - docker:24-dind
  before_script:
    # Install docker CLI — google/cloud-sdk:slim is Debian-based but ships
    # without Docker; docker.io provides the CLI to talk to the DinD daemon.
    - apt-get update -qq && apt-get install -y --no-install-recommends docker.io
    - echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json
    - gcloud auth configure-docker "$REGISTRY" --quiet
    - rm -f /tmp/gcp-sa-key.json

# ---------------------------------------------------------------------------
# Reports image (all 4 Cloud Run Jobs)
# ---------------------------------------------------------------------------
build-reports:
  stage: build
  <<: *gcp_auth
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile.python
        - requirements.txt
        - git_branches_gap/**/*
        - git_gcp_code_vs_environment_drift/**/*
        - bigquery_orphan_datasets/**/*
        - clone_all_groups_repo/**/*
        - entrypoint.sh
  script:
    - IMAGE="$REGISTRY/$PROJECT_ID/$REPO/devops-reports"
    - docker build
        -f Dockerfile.python
        --build-arg BUILD_SHA="$CI_COMMIT_SHORT_SHA"
        -t "$IMAGE:$CI_COMMIT_SHORT_SHA"
        -t "$IMAGE:latest"
        .
    # Scan for HIGH/CRITICAL CVEs before pushing — blocks push on findings.
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"

# ---------------------------------------------------------------------------
# UI image (Cloud Run Service)
# ---------------------------------------------------------------------------
build-ui:
  stage: build
  <<: *gcp_auth
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ui/Dockerfile
        - ui/**/*
  script:
    - IMAGE="$REGISTRY/$PROJECT_ID/$REPO/devops-reports-ui"
    - docker build
        -f ui/Dockerfile
        --build-arg BUILD_SHA="$CI_COMMIT_SHORT_SHA"
        -t "$IMAGE:$CI_COMMIT_SHORT_SHA"
        -t "$IMAGE:latest"
        ui/
    # Scan for HIGH/CRITICAL CVEs before pushing — blocks push on findings.
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"

# ---------------------------------------------------------------------------
# Terraform plan (informational — no apply in CI)
# ---------------------------------------------------------------------------
terraform-plan:
  stage: terraform
  image: hashicorp/terraform:1.8
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Terraform/**/*
  before_script:
    - cd Terraform
    - echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
  script:
    - terraform init -input=false
    - terraform plan -input=false -var-file=terraform.tfvars
  after_script:
    - rm -f /tmp/gcp-sa-key.json

# ---------------------------------------------------------------------------
# GitLab Release — created automatically when a vX.Y.Z tag is pushed.
#
# Usage:
#   git tag -a v1.2.0 -m "Release v1.2.0: <summary>"
#   git push origin v1.2.0
#
# The release description is read from the annotated tag message so the
# release notes live in Git alongside the code rather than being typed
# into the GitLab UI manually.
# ---------------------------------------------------------------------------
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: $CI_COMMIT_TAG_MESSAGE
